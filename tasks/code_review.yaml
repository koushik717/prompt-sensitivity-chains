      import threading

      counter = 0

      def worker(n):
          global counter
          for _ in range(n):
              counter += 1

      def run(total, threads=8):
          ts = [threading.Thread(target=worker, args=(total // threads,)) for _ in range(threads)]
          [t.start() for t in ts]
          return counter
