name: code_review
description: >
  Four-stage code review pipeline: analyzer -> reviewer -> security_checker -> report_writer.
  Input is a Python snippet; final output is a structured JSON review report.
roles: [analyzer, reviewer, security_checker, report_writer]
structured_output: true
output_schema:
  required_keys: [summary, issues, severity]   # final report must be JSON with these keys

judge_rubric_version: v2
# Depth-appropriate rubrics: depth 1 = static analysis, 2 = prioritized review,
# 3 = security-augmented review, 4 = final JSON report.
judge_rubrics_by_depth:
  1: |
    You are grading a STATIC ANALYSIS of the given Python snippet on a 0-10
    scale. The expected artifact is prose/bullet analysis (not JSON).
    Award points as follows (integer total):
    - Bug detection (0-4): identifies the real defect(s) in the code.
    - Breadth (0-3): considers error handling, performance, and concurrency
      where relevant.
    - Accuracy (0-2): no fabricated defects or misreadings of the code.
    - Format (0-1): analysis only, no meta-commentary.
    Respond with ONLY a JSON object: {"score": <int 0-10>, "rationale": "<one sentence>"}
  2: |
    You are grading a PRIORITIZED CODE REVIEW of the given Python snippet on a
    0-10 scale. The expected artifact is a ranked review (not JSON).
    Award points as follows (integer total):
    - Bug detection (0-4): identifies the real defect(s) in the code.
    - Prioritization (0-2): issues ranked sensibly by severity/impact.
    - Actionability (0-3): concrete fix suggestions.
    - Format (0-1): review only, no meta-commentary.
    Respond with ONLY a JSON object: {"score": <int 0-10>, "rationale": "<one sentence>"}
  3: |
    You are grading a SECURITY-AUGMENTED CODE REVIEW of the given Python
    snippet on a 0-10 scale. The expected artifact is a review with security
    findings marked (not JSON). Award points as follows (integer total):
    - Bug & vulnerability detection (0-4): identifies the real defect(s),
      including any injection/unsafe patterns present.
    - Security specificity (0-3): security findings named precisely
      (e.g. SQL injection) and marked as security issues.
    - Actionability (0-2): concrete fix suggestions.
    - Format (0-1): review only, no meta-commentary.
    Respond with ONLY a JSON object: {"score": <int 0-10>, "rationale": "<one sentence>"}
  4: |
    You are grading a FINAL CODE REVIEW REPORT for the given Python snippet on
    a 0-10 scale. Award points as follows (integer total):
    - Bug detection (0-4): identifies the real defect(s) in the code.
    - Security awareness (0-2): flags any injection/unsafe patterns present.
    - Actionability (0-2): concrete fix suggestions.
    - Format (0-2): valid JSON with keys summary, issues, severity.
    Respond with ONLY a JSON object: {"score": <int 0-10>, "rationale": "<one sentence>"}
judge_rubric: |
  You are grading a code review report for the given Python snippet on a 0-10 scale.
  Award points as follows (integer total):
  - Bug detection (0-4): identifies the real defect(s) in the code.
  - Security awareness (0-2): flags any injection/unsafe patterns present.
  - Actionability (0-2): concrete fix suggestions.
  - Format (0-2): valid JSON with keys summary, issues, severity.
  Respond with ONLY a JSON object: {"score": <int 0-10>, "rationale": "<one sentence>"}

