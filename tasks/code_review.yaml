      def load_config(path="config.json", cache={}):
          if path in cache:
              return cache[path]
          import json
          with open(path) as f:
              data = json.loads(f.read())
          cache[path] = data
          return data

      def merge_defaults(cfg, defaults):
          for k in defaults:
              if k not in cfg:
                  cfg[k] = defaults[k]
          return cfg
