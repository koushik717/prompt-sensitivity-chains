task: summarization
role: extractor
base_prompt: You are an information extractor. Given an article, extract every distinct factual claim,
  number, name, and date as a bulleted list. Do not interpret or summarize; preserve the original figures
  exactly. Output only the list.
generator_model: claude-sonnet-4-6
backend: anthropic
paraphrases:
